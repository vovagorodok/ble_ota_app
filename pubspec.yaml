name: ble_ota_app
description: Upload firmware over bluetooth.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=2.18.1 <3.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  flutter_reactive_ble: ^5.0.3
  file_picker: ^5.2.5
  archive: ^3.3.5
  permission_handler: ^10.2.0
  http: ^0.13.5
  wakelock: ^0.6.2
  expandable: ^5.0.1
  meta: ^1.8.0
  flutter_settings_screens: ^0.3.3-null-safety+2
  jumping_dot: ^0.0.4
  easy_localization: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

dependency_overrides:
  flutter_reactive_ble:
    git:
      url: https://github.com/vovagorodok/flutter_reactive_ble.git
      path: packages/flutter_reactive_ble
  reactive_ble_mobile:
    git:
      url: https://github.com/vovagorodok/flutter_reactive_ble.git
      path: packages/reactive_ble_mobile
  reactive_ble_web:
    git:
      url: https://github.com/vovagorodok/flutter_reactive_ble.git
      path: packages/reactive_ble_web

flutter:
  uses-material-design: true
  assets:
    - assets/translations/